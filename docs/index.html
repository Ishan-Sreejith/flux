<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flux Evolver | Focus Mode</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="focus-app" id="appRoot" data-mode="setup">
      <header class="focus-header">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>Flux Evolver</h1>
            <p>Minimalist evolution canvas for high-signal training.</p>
          </div>
        </div>
        <div class="header-meta">
          <span id="datasetStatus">0 samples</span>
          <span id="statusMessage">Ready.</span>
        </div>
      </header>

      <section class="stage stage-setup" id="setupStage">
        <div class="setup-card">
          <div class="setup-head">
            <h2>Load Training Data</h2>
            <p>Drop a JSON or CSV file, or paste data below.</p>
          </div>
          <div class="upload-zone">
            <input type="file" id="fileInput" />
            <div>
              <strong>Drag & drop</strong>
              <span>or click to upload</span>
            </div>
          </div>
          <textarea id="datasetInput" rows="8" placeholder="Paste JSON or CSV here"></textarea>

          <div class="slider-grid">
            <div class="slider-card">
              <label for="librarySize">Library Size</label>
              <input id="librarySize" type="range" min="1" max="1000" value="300" />
              <span id="libraryValue">300</span>
            </div>
            <div class="slider-card">
              <label for="populationSize">Population</label>
              <input id="populationSize" type="number" min="10" max="400" value="120" />
            </div>
            <div class="slider-card">
              <label for="genomeLength">Genome Length</label>
              <input id="genomeLength" type="number" min="3" max="20" value="8" />
            </div>
            <div class="slider-card">
              <label for="generationCount">Generations</label>
              <input id="generationCount" type="number" min="10" max="2000" value="300" />
            </div>
            <div class="slider-card">
              <label for="accuracyTarget">Accuracy Target</label>
              <input id="accuracyTarget" type="number" min="0.1" max="1" step="0.01" value="0.95" />
            </div>
          </div>

          <div class="setup-actions">
            <button id="btnSample" class="ghost">Load Sample</button>
            <button id="btnStart">Start Evolution</button>
          </div>
        </div>
      </section>

      <section class="stage stage-evolution hidden" id="evolutionStage">
        <div class="evolution-center">
          <div class="progress-ring">
            <svg id="progressSvg" width="240" height="240" viewBox="0 0 240 240">
              <circle class="ring-track" cx="120" cy="120" r="92" />
              <circle class="ring-progress" cx="120" cy="120" r="92" />
            </svg>
            <div class="ring-label">
              <span id="progressValue">0%</span>
              <small>Generation <strong id="genValue">0</strong></small>
            </div>
          </div>
          <div class="evolution-actions">
            <button id="btnPause" class="ghost">Pause</button>
            <button id="btnStop">Stop</button>
          </div>
        </div>
        <div class="evolution-side">
          <h2>Top 3 Formulas</h2>
          <div id="topFormulas" class="formula-list"></div>
          <div class="fitness-row">
            <span>Best <strong id="bestFitness">0.000</strong></span>
            <span>Avg <strong id="avgFitness">0.000</strong></span>
          </div>
          <div id="evolutionLog" class="log">Awaiting first generation...</div>
        </div>
      </section>

      <section class="stage stage-result hidden" id="resultStage">
        <div class="result-card">
          <h2>Winning Recipe</h2>
          <div id="recipeChain" class="recipe-chain"></div>
          <div class="result-meta" id="resultMeta"></div>
          <button id="btnRestart" class="ghost">Run Again</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
