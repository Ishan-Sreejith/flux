<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flux Evolver Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page theme-slate" id="appRoot">
      <header class="hero">
        <div>
          <h1>Flux Evolver</h1>
          <p>Client-side evolutionary trainer with visualization and interactive Q&amp;A.</p>
        </div>
        <div class="hero-actions">
          <select id="themeSelect">
            <option value="theme-slate">Slate</option>
            <option value="theme-sand">Sand</option>
            <option value="theme-oxide">Oxide</option>
          </select>
          <button id="btnTrain">Start Training</button>
          <button id="btnStop" class="ghost">Stop</button>
        </div>
      </header>

      <section class="grid">
        <div class="card" data-panel="dataset">
          <div class="card-header">
            <h2>Dataset</h2>
            <button class="close" data-close="dataset">Hide</button>
          </div>
          <h2>Dataset</h2>
          <div class="row">
            <select id="exampleSelect">
              <option value="market">Market (linear)</option>
              <option value="solar">Solar (linear)</option>
              <option value="voyager">Voyager (vector)</option>
            </select>
            <button id="btnLoadExample" class="ghost">Load Example</button>
          </div>
          <textarea id="datasetInput" rows="10"></textarea>
          <div class="row meta">
            <span id="datasetStatus">0 samples</span>
            <span id="statusMessage">Ready.</span>
          </div>
        </div>

        <div class="card" data-panel="controls">
          <div class="card-header">
            <h2>Controls</h2>
            <button class="close" data-close="controls">Hide</button>
          </div>
          <div class="control">
            <label>Library Size: <span id="libraryValue">500</span></label>
            <input id="librarySize" type="range" min="10" max="1000" value="500" />
          </div>
          <div class="row">
            <label>Mode</label>
            <select id="modeSelect">
              <option value="all">All</option>
              <option value="math">Math</option>
              <option value="text">Text</option>
              <option value="list">List</option>
            </select>
          </div>
          <div class="row">
            <label>Population</label>
            <input id="populationSize" type="number" min="10" max="400" value="60" />
            <label>Generations</label>
            <input id="generationCount" type="number" min="10" max="2000" value="200" />
          </div>
          <div class="row">
            <label>Initial Randomness</label>
            <input id="initialRandomness" type="number" step="0.05" min="0" max="1" value="0.25" />
          </div>
        </div>
      </section>

      <section class="grid">
        <div class="card" data-panel="training">
          <div class="card-header">
            <h2>Training</h2>
            <button class="close" data-close="training">Hide</button>
          </div>
          <canvas id="scoreChart" height="160"></canvas>
          <div class="stats">
            <div><span>Best Accuracy</span><strong id="bestScore">-</strong></div>
            <div><span>Generation</span><strong id="currentGen">0</strong></div>
            <div><span>Status</span><strong id="trainStatus">idle</strong></div>
          </div>
        </div>
        <div class="card" data-panel="algorithm">
          <div class="card-header">
            <h2>Algorithm Map</h2>
            <button class="close" data-close="algorithm">Hide</button>
          </div>
          <div class="algo-wrap">
            <div class="algo-meta">
              <span id="algoTitle">No genome yet.</span>
              <span id="algoCount">0 steps</span>
            </div>
            <div id="algorithmMap" class="algo-list"></div>
          </div>
        </div>
      </section>

      <section class="grid">
        <div class="card" data-panel="ask">
          <div class="card-header">
            <h2>Ask</h2>
            <button class="close" data-close="ask">Hide</button>
          </div>
          <div class="row">
            <textarea id="algoKeyInput" rows="3" placeholder="Paste Algorithm Key JSON here"></textarea>
          </div>
          <div class="row">
            <input id="askInput" placeholder="Type a key (JSON allowed)" />
            <button id="btnAsk" class="ghost">Ask</button>
          </div>
          <div class="answer" id="askOutput">No answer yet.</div>
        </div>
      </section>

      <section class="dock" id="panelDock">
        <button data-open="dataset">Dataset</button>
        <button data-open="controls">Controls</button>
        <button data-open="training">Training</button>
        <button data-open="algorithm">Algorithm</button>
        <button data-open="ask">Ask</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
