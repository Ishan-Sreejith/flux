<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Animal1010101 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="hero__tag">Animal1010101</div>
        <h1>Schema Q&A</h1>
        <p>Ask a question. The engine answers and simulates the flowchart path.</p>
      </header>

      <section class="card">
        <div class="form-row">
          <input id="qa-input" type="text" placeholder="Explain dogs in simple terms" />
          <button id="qa-btn">Ask</button>
        </div>
        <label class="toggle">
          <input id="qa-live" type="checkbox" />
          <span>Use live web override</span>
        </label>
        <textarea id="qa-output" class="output" rows="10" readonly></textarea>
      </section>

      <footer class="footer">
        <div>Static demo built for GitHub Pages.</div>
      </footer>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
