<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flux Lite</title>
    <link rel="stylesheet" href="docs/styles.css" />
  </head>
  <body class="light">
    <main class="minimal">
      <section class="panel left">
        <div class="input-row">
          <input id="qa-input" type="text" placeholder="Ask about an animal..." />
          <button id="qa-btn">Ask</button>
        </div>
        <label class="toggle">
          <input id="qa-live" type="checkbox" />
          <span>Enable internet</span>
        </label>
        <textarea id="qa-output" class="output" rows="12" readonly></textarea>
      </section>
      <section class="panel right">
        <div id="flowchart" class="flowchart full"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script type="module" src="docs/app.js"></script>
  </body>
</html>
