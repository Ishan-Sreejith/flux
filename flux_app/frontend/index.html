<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flux AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-api-default="http://127.0.0.1:3001">
    <main class="app">
      <header class="app__header">
        <h1>Flux AI</h1>
        <p>Local-first, web-grounded, explainable answers.</p>
      </header>

      <section id="chat" class="chat"></section>

      <form id="ask-form" class="composer">
        <input id="question" type="text" placeholder="Ask a question" autocomplete="off" />
        <label class="trainer__field">
          Grade
          <input id="ask-grade" type="number" min="6" max="16" value="10" />
        </label>
        <label class="toggle">
          <input id="refresh" type="checkbox" />
          Refresh web
        </label>
        <label class="toggle">
          <input id="experimental" type="checkbox" />
          Experimental mode
        </label>
        <button type="submit">Send</button>
      </form>

      <section class="trainer">
        <h2>Train</h2>
        <p>Enter one question or sentence per line. The system will fetch sources and learn.</p>
        <textarea id="train-input" rows="6" placeholder="Example:\nWhat is an embedding?\nExplain caching in simple terms.\nWhat is a database index?"></textarea>
        <div class="trainer__actions">
          <label class="trainer__field">
            Dim
            <input id="train-dim" type="number" min="50" max="600" value="200" />
          </label>
          <label class="trainer__field">
            Grade
            <input id="train-grade" type="number" min="6" max="16" value="10" />
          </label>
          <label class="trainer__field">
            Max sources
            <input id="train-sources" type="number" min="1" max="5" value="1" />
          </label>
          <label class="trainer__field">
            Workers
            <input id="train-workers" type="number" min="1" max="16" value="6" />
          </label>
          <label class="toggle">
            <input id="train-full" type="checkbox" />
            Full pages
          </label>
          <label class="toggle">
            <input id="train-word2vec" type="checkbox" />
            Update word2vec
          </label>
          <button id="train-submit" type="button">Train Now</button>
          <span id="train-status" class="trainer__status">Idle</span>
        </div>
      </section>

      <section class="trainer">
        <h2>Context Controls</h2>
        <p>Adjust how much context and structure the system applies. Sliders: <span id="nlp-count">0</span>.</p>
        <div id="nlp-sliders" class="slider-grid"></div>
      </section>
    </main>

    <script src="app.js?v=4"></script>
  </body>
</html>
